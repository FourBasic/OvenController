[env:uno]
platform = atmelavr
board = uno
framework = arduino
lib_deps = 
	https://github.com/FourBasic/Timer.git
	https://github.com/FourBasic/GeneralFunctions.git
	https://github.com/FourBasic/AwfulPID.git
	https://github.com/FourBasic/DeviceInterface.git
	adafruit/Adafruit GFX Library@^1.12.5
	lib/hidden/MCUFRIEND_kbv
	lib/hidden/Adafruit_TFTLCD_Library